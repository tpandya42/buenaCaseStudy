# Fly.io app configuration
# Update `app` and `primary_region` for your environment before deploying.
app = "replace-with-your-fly-app-name"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "stop"
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 25
    hard_limit = 50

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

# Do not place secrets in this file.
# Set them at deploy/runtime with:
#   fly secrets set DATABASE_URL=... JWT_SECRET=...
